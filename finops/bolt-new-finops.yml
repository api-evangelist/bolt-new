specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Bolt.new
providerId: bolt-new
created: '2026-05-08'
modified: '2026-05-25'
reconciled: true
tags:
- AI
- No-Code
- App Builder
- WebContainers
- StackBlitz
- FinOps
- FOCUS
description: Bolt.new is a token-metered AI builder. FinOps levers center on managing per-seat subscriptions and per-month token consumption.
notes: Bolt.new does not publish a public REST API; cost data must be collected from invoices and the in-app usage view.
sources:
- https://bolt.new/
- https://support.bolt.new/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: StackBlitz, Inc.
serviceCategory: AI
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: Bolt.new
  ServiceCategory: AI
  ProviderName: StackBlitz
  PublisherName: StackBlitz
  InvoiceIssuerName: StackBlitz
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: tokens
  description: AI prompt tokens consumed by the builder.
  unit: token
  aggregation: sum
  dimensions:
  - account
  - workspace
- name: seats
  description: Active seats on Teams plans.
  unit: seat
  aggregation: max
  dimensions:
  - workspace
principles:
- name: Visibility
  description: Pull invoices and the in-app token usage view; there is no usage export API.
- name: Allocation
  description: Allocate by workspace/team since invoices are at the account level.
- name: Optimization
  description: Right-size plan tier; scope prompts narrowly to limit token burn; archive idle workspaces.
- name: Accountability
  description: Designate workspace owners to review token consumption against monthly allotments.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com

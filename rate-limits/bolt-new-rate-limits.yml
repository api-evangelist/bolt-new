specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Bolt.new
providerId: bolt-new
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- No-Code
- App Builder
- WebContainers
- StackBlitz
- Rate Limiting
description: Bolt.new throttles consumption via monthly token allotments rather than per-second HTTP rate limits. There is no public API surface to rate-limit.
notes: No documented HTTP API; usage is gated by token quota per plan tier. Daily reload caps may apply on the Free plan.
sources:
- https://bolt.new/
- https://support.bolt.new/
responseCodes:
  throttled: n/a
limits:
- name: Free Daily Tokens
  scope: account
  metric: tokens
  limit: capped daily allotment that resets each day
  notes: Free users get a small daily allotment for experimentation.
- name: Plan Token Quota
  scope: account
  metric: tokens
  limit: monthly token allotment per plan
  notes: When monthly tokens are exhausted, builds and prompts are blocked until the next billing cycle or until the user upgrades / buys a top-up.
policies:
- name: Token Budgeting
  description: Users should budget token usage; the in-browser UI surfaces remaining tokens.
- name: Upgrade or Top-Up
  description: When tokens are exhausted, upgrade plan or purchase a token top-up.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com

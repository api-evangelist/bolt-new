aid: bolt-new
name: Bolt.new
description: >-
  Bolt.new is StackBlitz's in-browser AI full-stack app builder. From a natural
  language prompt it generates, edits, runs, and deploys complete web
  applications inside the user's browser tab using StackBlitz's WebContainer
  runtime — a WebAssembly-based Node.js operating system that boots a real
  filesystem, npm/pnpm/yarn package manager, terminal, and live preview
  without a remote VM. The product targets product managers, entrepreneurs,
  marketers, agencies, and non-engineer builders with conversational app
  creation, design-system import from Figma and component libraries
  (Material UI, Chakra UI, Shadcn/ui), built-in database and authentication,
  one-click deploy to Netlify or bolt.host, custom domains, GitHub version
  control, and integrations with Supabase, Stripe, Expo, and MCP servers.
  Bolt.new itself is a hosted, UI-driven product metered in monthly AI tokens
  with Free, Pro, Teams, and Enterprise tiers — there is no public REST/HTTP
  developer API or CLI. StackBlitz separately ships the WebContainer API as a
  JavaScript/TypeScript SDK (npm @webcontainer/api) for embedding the same
  in-browser dev environment in third-party sites, plus a StackBlitz SDK
  (@stackblitz/sdk) for programmatically opening projects. The Bolt.new
  reference codebase is open source under MIT at github.com/stackblitz/bolt.new
  as a foundation for building custom AI dev agents; the hosted commercial
  product is closed source.
